molecular_system:
  name: alanine_dipeptide
  force_field: amber14-all.xml
  implicit_solvent: implicit/gbn2.xml
  nonbonded_method: NoCutoff
  constraints: HBonds
  solute_dielectric: 1.0
  solvent_dielectric: 78.5

bridge:
  path_steps_K: 100
  normalized_time: [0.0, 1.0]
  context_fields: [temperature, basin_pair]

reference:
  method: parallel_tempering_mbar
  temperature_ladder_K: [300.0, 338.7, 382.4, 431.8, 487.5, 550.0]
  production_ns_per_replica: 200
  exchange_interval_ps: 1

variants: [deterministic, fixed_noise, learned_isotropic, noisde]
outputs:
  seed_level: data/processed/seed_level/alanine_transport_results.csv
  run_index: data/metadata/run_index_alanine_transport.csv

source_samples:
  npz: data/external/alanine_dipeptide/source_samples_alphaR.npz

target_samples:
  npz: data/external/alanine_dipeptide/target_samples_beta.npz

source_potential:
  structure_path: data/external/alanine_dipeptide/alanine_dipeptide.pdb
  forcefield_files: [amber14-all.xml, implicit/gbn2.xml]
  temperature_kelvin: 300.0
  nonbonded_method: NoCutoff
  constraints: HBonds
  solute_dielectric: 1.0
  solvent_dielectric: 78.5

target_potential:
  structure_path: data/external/alanine_dipeptide/alanine_dipeptide.pdb
  forcefield_files: [amber14-all.xml, implicit/gbn2.xml]
  temperature_kelvin: 300.0
  nonbonded_method: NoCutoff
  constraints: HBonds
  solute_dielectric: 1.0
  solvent_dielectric: 78.5

task:
  name: alanine_alphaR_to_beta
  batch_size: 32
  context_dim: 2

model:
  state_dim: auto
  context_dim: auto
  rank: 8
  hidden_dim: 128
  depth: 3
  diffusion_floor: 0.0001
  diffusion_max_scale: 0.25
  energy_guidance_scale: 1.0
  variant: A4
  fixed_noise_scale: 0.1
  over_noise_scale: 3.0

loss:
  lambda_end: 1.0
  lambda_energy: 0.1
  lambda_pn: 1.0
  lambda_reg: 0.001
  path_steps: 100
  energy_threshold: 10.0
  endpoint_kernel_bandwidth: 1.0
  utility_weights:
    ESS_N: 1.0
    A_swap: 1.0
    C_mode: 1.0
    D_E: 1.0
    CV2_w: 1.0
    R_high_E: 1.0

trainer:
  steps: 10000
  lr: 0.0001
  checkpoint_dir: checkpoints/alanine_alphaR_to_beta
  seed: 20260524
  max_grad_norm: 1.0

validation:
  path_steps: 100
  high_energy_threshold: 10.0

selection:
  safety_gates:
    r_high_e_max: 0.1
    d_e_max: 0.1
